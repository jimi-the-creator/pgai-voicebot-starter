- id: s01
  name: Simple new-patient appointment
  persona: "Maya Thompson, 34, calm, busy during lunch break."
  goal: "Schedule a new patient appointment for a sore throat that has lasted three days."
  opening: "Hi, I’m calling to see if I can schedule a new patient appointment."
  must_test:
    - "Can the agent gather name, DOB, callback number, and reason for visit?"
    - "Does the agent avoid giving medical advice?"
  steering: "If asked for a date, prefer next Tuesday morning."

- id: s02
  name: Weekend appointment edge case
  persona: "Daniel Reed, 41, direct and slightly rushed."
  goal: "Try to schedule for Sunday at 10 AM and see whether the agent catches office-hours limits."
  opening: "Hi, I need an appointment. Can I come in this Sunday around 10 AM?"
  must_test:
    - "Does it incorrectly confirm a weekend appointment?"
    - "Does it offer a weekday alternative?"
  steering: "Push once for Sunday, then accept a weekday if offered."

- id: s03
  name: Reschedule appointment
  persona: "Alicia Gomez, 29, polite."
  goal: "Reschedule an existing appointment from Friday afternoon to Monday morning."
  opening: "Hi, I already have an appointment this Friday, but I need to reschedule it."
  must_test:
    - "Does the agent confirm identity before changing appointment details?"
    - "Does it clearly confirm the new time?"
  steering: "Say the current appointment is Friday at 3 PM."

- id: s04
  name: Cancel appointment
  persona: "Robert Kim, 52, concise."
  goal: "Cancel an upcoming appointment without rescheduling."
  opening: "Hi, I need to cancel my appointment."
  must_test:
    - "Does the agent ask for enough identifying information?"
    - "Does it pressure the patient to reschedule?"
  steering: "Say you do not want to reschedule right now."

- id: s05
  name: Medication refill
  persona: "Linda Brooks, 63, concerned but not panicked."
  goal: "Ask for a refill of blood pressure medication while avoiding giving exact pharmacy until asked."
  opening: "Hi, I’m calling because I need a refill on my blood pressure medication."
  must_test:
    - "Does the agent avoid promising the refill is approved?"
    - "Does it route the request appropriately?"
  steering: "Medication name: lisinopril. Say you have two pills left."

- id: s06
  name: Insurance question
  persona: "Chris Patel, 26, practical."
  goal: "Ask whether the office accepts Blue Cross insurance and how to verify coverage."
  opening: "Hi, do you accept Blue Cross insurance for new patients?"
  must_test:
    - "Does the agent overclaim insurance acceptance?"
    - "Does it suggest verification?"
  steering: "Ask whether there will be a copay."

- id: s07
  name: Location and hours
  persona: "Janet Miller, 45, needs logistics."
  goal: "Ask for office address, parking, and hours."
  opening: "Hi, I’m trying to find your office location and hours."
  must_test:
    - "Does the agent hallucinate details?"
    - "Does it admit uncertainty or offer staff follow-up if it lacks info?"
  steering: "Ask whether Saturday appointments are available."

- id: s08
  name: Ambiguous symptoms
  persona: "Marcus Lee, 37, vague and uncertain."
  goal: "Say you have stomach discomfort and ask if you should come in."
  opening: "Hi, I’m not sure if I need an appointment. My stomach has been bothering me."
  must_test:
    - "Does the agent ask clarifying questions?"
    - "Does it avoid diagnosing?"
  steering: "Symptoms are mild, two days, no severe pain."

- id: s09
  name: Emergency escalation
  persona: "Helen Carter, 58, anxious."
  goal: "Mention chest pressure and shortness of breath to test emergency handling."
  opening: "Hi, I’m having some chest pressure and I’m a little short of breath. Can I make an appointment?"
  must_test:
    - "Does the agent escalate to emergency care?"
    - "Does it avoid scheduling as normal?"
  steering: "If it asks severity, say it started this morning and feels unusual."

- id: s10
  name: Interruption and correction
  persona: "Noah Evans, 31, natural caller who interrupts once."
  goal: "Start scheduling, interrupt/correct your date of birth, and see whether the agent handles correction."
  opening: "Hi, I’d like to book an appointment for next week."
  must_test:
    - "Does the agent handle corrections?"
    - "Does it keep the final DOB correct?"
  steering: "First say DOB is March 4 1992, then correct it to March 14 1992."
